<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Add Inventory | JohnnyMart</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><a class="logo" href="index.html"><span>JohnnyMart</span><small>Inventory Admin</small></a><nav class="nav"><a href="index.html">View Site</a></nav></header><main class="shop"><div class="sectionTitle"><div><p class="tag red">Inventory helper</p><h2>Add products on this device</h2><p>This saves products in this browser using local storage. For a public site, copy the generated product data into <b>products.js</b>.</p></div></div><form id="productForm" class="guaranteePanel" style="background:white;color:#111"><label>Name<br><input required name="name"></label><br><br><label>Category<br><select name="category"></select></label><br><br><label>Price<br><input name="price" placeholder="$25 or Message for price"></label><br><br><label>Image path<br><input name="image" placeholder="assets/my-photo.jpg"></label><br><br><label>Description<br><textarea required name="description" rows="4"></textarea></label><br><br><button class="btn" type="submit">Add Product</button><button class="btn ghost dark" type="button" id="reset">Reset Starter Products</button></form><h2>Current products</h2><div id="adminList" class="productGrid"></div><h2>Product data to paste into products.js</h2><textarea id="exportBox" rows="12" style="width:100%;font-family:monospace"></textarea></main><script src="products.js"></script><script src="admin.js"></script></body></html>
